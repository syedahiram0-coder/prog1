<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My GitHub Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        header {
            background: #2c3e50;
            color: white;
            padding: 30px 0;
        }
        section {
            padding: 40px 20px;
        }
        h1 {
            margin-bottom: 10px;
        }
        p {
            font-size: 18px;
            color: #333;
        }
        .card {
            background: white;
            max-width: 500px;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        footer {
            background: #2c3e50;
            color: white;
            padding: 15px 0;
            margin-top: 40px;
        }
    </style>
</head>
<body>

<header>
    <h1>Welcome to My GitHub</h1>
    <p>Computer Science Engineering Student</p>
</header>

<section>
    <div class="card">
        <h2>About Me</h2>
        <p>
            Hi, I’m a 3rd year CSE student interested in Python and Web Development.
            I enjoy learning new technologies and building simple projects.
        </p>

        <h2>Skills</h2>
        <p>Python • HTML • CSS • Git • GitHub</p>
    </div>
</section>

<footer>
    <p>© 2026 | Made by Me</p>
</footer>

</body>
</html>
